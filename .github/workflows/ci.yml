name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go test -shuffle=on ./...
      - run: CGO_ENABLED=1 go test -race -shuffle=on ./...
        if: runner.os != 'Windows'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  corpus:
    name: Corpus conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out pawnlint
        uses: actions/checkout@v7
        with:
          path: pawnlint
      - name: Check out pawn-corpus
        uses: actions/checkout@v7
        with:
          repository: pawnkit/pawn-corpus
          ref: ff6369e0060edb8667379abd35207d7d893ea12b
          path: pawn-corpus
      - uses: actions/setup-go@v6
        with:
          go-version-file: pawnlint/go.mod
      - name: Run corpus-backed tests
        working-directory: pawnlint
        env:
          PAWN_CORPUS_DIR: ${{ github.workspace }}/pawn-corpus
        run: go test -count=1 ./...

  build:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

  security:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  fuzz-smoke:
    name: Fuzz smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./internal/source/walk -run=^$ -fuzz=FuzzWalk -fuzztime=30s
      - run: go test ./pkg/lint/suppress -run=^$ -fuzz=FuzzSuppression -fuzztime=30s
      - run: go test ./internal/semantic -run=^$ -fuzz=FuzzBuild -fuzztime=30s
      - run: go test ./pkg/rules/correctness -run=^$ -fuzz=FuzzMalformed -fuzztime=30s

  release-check:
    name: Release snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.12.7
          args: release --snapshot --clean
