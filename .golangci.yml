version: "2"

run:
  concurrency: 4
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - ineffassign
    - misspell
    - asciicheck
    - nolintlint
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
  settings:
    errcheck:
      check-type-assertions: true
    nolintlint:
      require-explanation: true
      require-specific: true
    staticcheck:
      checks:
        - all
        - -QF*
        - -ST1000

formatters:
  enable:
    - gofmt
